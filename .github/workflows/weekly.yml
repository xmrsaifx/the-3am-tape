name: Weekly channel digest

on:
  # Sundays at 06:00 UTC (~11:00 PKT). Late enough that Saturday's daily run
  # has already snapshotted Saturday's stats, so a 7-day lookback works.
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      lookback:
        description: 'Days to compare against (default 7)'
        required: false
        default: '7'
      fetch_fresh:
        description: 'Take a fresh stats snapshot first (off by default — daily.yml already does this)'
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # commit the digest markdown back
      issues: write     # post the digest as a GitHub Issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build digest
        id: digest
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OUTPUT_DIR: ./outputs
        run: |
          ARGS="--lookback ${{ inputs.lookback || '7' }}"
          if [ "${{ inputs.fetch_fresh }}" = "true" ]; then ARGS="$ARGS --fetch"; fi
          # Capture stdout (the digest markdown) into a file for the issue body.
          python digest.py $ARGS > digest_body.md
          echo "digest_path=$(ls outputs/stats/digests/*.md | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Open GitHub Issue with the digest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Channel digest — $(date -u +%Y-%m-%d)"
          gh issue create \
            --title "$TITLE" \
            --label "digest" \
            --body-file digest_body.md \
            || gh issue create \
              --title "$TITLE" \
              --body-file digest_body.md
          # Second `gh issue create` fallback runs without --label in case the
          # 'digest' label doesn't exist yet (first run on a new repo).

      - name: Commit digest markdown
        if: success()
        run: |
          git config user.name  "money-crew-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/stats/digests/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no new digest to commit"
          else
            git commit -m "chore(weekly): digest $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
