name: 3AM Tape Long — render + upload

# Matrix-style long-form pipeline. See CLAUDE.md + LONG_FORM.md for spec.
#
# Architecture (3 jobs):
#   1. prepare         — pick next script, emit video_id + sections matrix
#   2. render-section  — matrix; one job per section renders its N images + 1 MP3
#                        + captions JSON, uploads as per-section artifact
#   3. assemble-upload — pulls all section artifacts, runs FFmpeg concat,
#                        generates SRT + thumbnail, uploads to YouTube + Facebook
#
# Why matrix: a single 10-min long-form render hits ~50 Pollinations calls plus
# heavy FFmpeg. Serial on one runner would blow past GHA timeouts (Pollinations
# rate-limit retries alone can push a single section to 8-15 min). 10 parallel
# section-shards drop wall-clock from 60-90 min serial to ~15-20 min, and any
# single shard failure is independently re-runnable thanks to file-existence
# caching in the pipeline modules.

on:
  # AUTO-CRON PAUSED 2026-06-03 — long-form is not getting algorithmic
  # surface at the current sub count: 14 long uploads in 14 days averaged
  # 5.8 views/upload with 50% sitting at 0 views permanently. Render budget
  # was being spent on videos no algorithm was surfacing. Channel is in
  # YPP monetization push focused on Shorts (10M views / 90 days target);
  # long-form pipeline stays intact but only fires on manual dispatch.
  # Resume the cron once the channel passes ~5k subscribers — at that point
  # the long-form algorithm has enough subscriber-engagement signal to
  # actually test the videos on a warm audience.
  #
  # Scripts queued in scripts/long/ (12 deep as of 2026-06-03) stay where
  # they are — manual workflow_dispatch will still FIFO-consume them.
  #
  # schedule:
  #   - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      script:
        description: 'Specific script filename in scripts/long/ (e.g. longtape-grandmother-house-001.json). Blank = oldest queued.'
        required: false
        default: ''
      privacy:
        description: 'YouTube privacy on upload'
        required: true
        type: choice
        options: [unlisted, public, private]
        default: unlisted
      skip_fb:
        description: 'Skip Facebook cross-post (useful while debugging FB or if FB token is missing)'
        type: boolean
        default: false
      skip_upload:
        description: 'Render-only: build the mp4 but do not upload anywhere. Final video posted as a workflow artifact.'
        type: boolean
        default: false

# Separate concurrency group from the Shorts pipeline (daily-pipeline) so the
# long-form workflow does not block or get blocked by the 4/day Shorts schedule.
concurrency:
  group: long-pipeline
  cancel-in-progress: false

jobs:
  # =========================================================================
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Needs write so we can record_topic() into outputs/used_topics.json if
    # we fall back to auto-generation (so the same topic isn't picked again
    # by tomorrow's cron).
    permissions:
      contents: write
    outputs:
      video_id: ${{ steps.pick.outputs.video_id }}
      script_path: ${{ steps.pick.outputs.script_path }}
      sections_matrix: ${{ steps.pick.outputs.sections_matrix }}
      section_count: ${{ steps.pick.outputs.section_count }}
      was_generated: ${{ steps.pick.outputs.was_generated }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pick next long-form script (or fallback-generate)
        id: pick
        env:
          # ANTHROPIC_API_KEY is OPTIONAL. If absent the workflow will fail
          # noisily when the queue is empty (intentional — fallback gen is
          # the safety net, not the primary path; manual scripts are expected).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_SCRIPT: ${{ inputs.script }}
        run: |
          set -euo pipefail
          python <<'PY'
          import json, os, sys
          from pathlib import Path

          input_script = os.environ.get("INPUT_SCRIPT", "").strip()
          long_dir = Path("scripts/long")
          long_dir.mkdir(parents=True, exist_ok=True)

          # 1. Explicit workflow_dispatch override: use that file exactly.
          if input_script:
              script_path = long_dir / input_script
              if not script_path.is_file():
                  print(f"::error::input script not found: {script_path}")
                  sys.exit(1)
              source = "workflow_dispatch input"
          else:
              # 2. FIFO from scripts/long/longtape-*.json (sorted by filename).
              candidates = sorted(long_dir.glob("longtape-*.json"))
              # Filter out anything that's actually a directory (archive/).
              candidates = [p for p in candidates if p.is_file()]
              if candidates:
                  script_path = candidates[0]
                  source = "queue FIFO"
              else:
                  # 3. Fallback: auto-generate ONE script if Claude key is set.
                  # Hand-written scripts always win — this only fires when
                  # the queue is genuinely empty at cron-fire time.
                  if not os.environ.get("ANTHROPIC_API_KEY"):
                      print(
                          "::error::scripts/long/ is empty and ANTHROPIC_API_KEY "
                          "is not set — cannot fallback-generate. Either queue a "
                          "hand-written script or add the secret."
                      )
                      sys.exit(1)
                  print("Queue empty — fallback-generating one long-form script via Claude")
                  from config.topics import pick_topic, record_topic
                  from pipeline import long_script_generator
                  topic = pick_topic("narrator")
                  print(f"  topic: {topic[:80]}...")
                  script = long_script_generator.generate("narrator", topic)
                  script_path = long_dir / f"{script['video_id']}.json"
                  script_path.write_text(json.dumps(script, indent=2))
                  # Record topic NOW (not on success) so simultaneous fires
                  # cannot pick the same one. Worst case: a renders fail and
                  # the topic is consumed, but pick_topic has ~35 seeds so
                  # the topic bank can absorb that without burning out.
                  record_topic("narrator", topic)
                  source = "fallback-generated"
                  print(f"  saved: {script_path}")

          data = json.loads(script_path.read_text())
          video_id = data["video_id"]
          sections = data.get("sections") or []
          ids = [s["id"] for s in sections]
          print(f"Picked ({source}): {script_path} -> {video_id} ({len(ids)} sections)")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"script_path={script_path}\n")
              fh.write(f"video_id={video_id}\n")
              fh.write(f"sections_matrix={json.dumps(ids)}\n")
              fh.write(f"section_count={len(ids)}\n")
              fh.write(f"was_generated={'true' if source == 'fallback-generated' else 'false'}\n")
          PY

      - name: Upload chosen script as artifact (matrix + assemble jobs restore from it)
        uses: actions/upload-artifact@v4
        with:
          # Lets render-section / assemble-upload jobs see the script even if
          # it was just fallback-generated in this job (not yet in git).
          name: long-script-pending
          path: ${{ steps.pick.outputs.script_path }}
          if-no-files-found: error
          retention-days: 3

      - name: Commit fallback-generated script + topic state
        if: steps.pick.outputs.was_generated == 'true'
        run: |
          git config user.name  "the-3am-tape-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/long/ outputs/used_topics.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no state changes to commit"
            exit 0
          fi
          git commit -m "chore(long): auto-generate $(basename '${{ steps.pick.outputs.script_path }}' .json) [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed; retrying after 5s..."
            sleep 5
          done
          echo "::warning::failed to push fallback script after 3 attempts (continuing anyway — artifact still flows through)"

  # =========================================================================
  render-section:
    needs: prepare
    runs-on: ubuntu-latest
    # 5 images + 1 MP3 per shard. Local test: 6 min (Pollinations warm).
    # CI worst case: rate-limit storm — 5 images × 8 retries × ~180s backoff
    # = ~60 min. The 75-min budget cushions a bad-Pollinations day without
    # leaving stuck shards hanging forever.
    timeout-minutes: 75
    # fail-fast=false: let other section shards finish even if one fails, so
    # we can re-run only the broken shard rather than redoing the full matrix.
    # max-parallel=4: stagger Pollinations hits — 10 shards all firing at once
    # share one GHA egress IP pool and trigger aggressive 429 rate-limiting.
    # 4-at-a-time spreads ~3 batches over ~30-40 min wall time and is much
    # friendlier to the free tier.
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        section: ${{ fromJson(needs.prepare.outputs.sections_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore chosen script (covers fallback-gen case where push may have failed)
        uses: actions/download-artifact@v4
        with:
          name: long-script-pending
          path: .

      - name: Render section ${{ matrix.section }} (images + voice + captions)
        env:
          FFMPEG_BIN: ffmpeg
          FFPROBE_BIN: ffprobe
          OUTPUT_DIR: ./outputs
          LOG_LEVEL: INFO
          # Required since mid-2026. Anonymous Pollinations now 402s on
          # GitHub Actions shared IPs. Register at enter.pollinations.ai,
          # paste the sk_... key as repo secret POLLINATIONS_KEY.
          POLLINATIONS_KEY: ${{ secrets.POLLINATIONS_KEY }}
        run: |
          python make_video.py "${{ needs.prepare.outputs.script_path }}" \
            --section ${{ matrix.section }}

      - name: Upload section artifact
        uses: actions/upload-artifact@v4
        with:
          name: long-section-${{ matrix.section }}
          # Preserves repo-relative paths so the assemble job can restore them
          # back into outputs/{images,voiceovers}/<video_id>/ with merge-multiple.
          path: |
            outputs/images/${{ needs.prepare.outputs.video_id }}/section_*
            outputs/voiceovers/${{ needs.prepare.outputs.video_id }}/section_*
          if-no-files-found: error
          retention-days: 3

  # =========================================================================
  assemble-upload:
    needs: [prepare, render-section]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Run even if a section shard failed, so partial-debug artifacts are still
    # available. The assembler will raise if a section's files are missing.
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore chosen script (covers fallback-gen case)
        uses: actions/download-artifact@v4
        with:
          name: long-script-pending
          path: .

      - name: Download all section artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: long-section-*
          merge-multiple: true
          # Lands back at outputs/images/<video_id>/ and outputs/voiceovers/<video_id>/
          # because the upload step preserved the repo-relative path.

      - name: Inspect restored layout (sanity check)
        run: |
          echo "Images:"
          ls -la "outputs/images/${{ needs.prepare.outputs.video_id }}" || true
          echo "Voiceovers:"
          ls -la "outputs/voiceovers/${{ needs.prepare.outputs.video_id }}" || true

      - name: Assemble + upload
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FFMPEG_BIN: ffmpeg
          FFPROBE_BIN: ffprobe
          OUTPUT_DIR: ./outputs
          LOG_LEVEL: INFO
        run: |
          ARGS="--assemble-only"
          if [ "${{ inputs.skip_upload }}" != "true" ]; then
            ARGS="$ARGS --upload --privacy=${{ inputs.privacy || 'unlisted' }}"
          fi
          if [ "${{ inputs.skip_fb }}" = "true" ]; then
            ARGS="$ARGS --no-fb"
          fi
          echo "running: python make_video.py ${{ needs.prepare.outputs.script_path }} $ARGS"
          python make_video.py "${{ needs.prepare.outputs.script_path }}" $ARGS

      - name: Archive script + commit state
        if: ${{ success() && inputs.skip_upload != true }}
        run: |
          git config user.name  "the-3am-tape-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SRC="${{ needs.prepare.outputs.script_path }}"
          DEST="scripts/long/archive/$(basename "$SRC")"
          mkdir -p scripts/long/archive
          git mv "$SRC" "$DEST" || mv "$SRC" "$DEST"
          git add scripts/long/ outputs/used_topics.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no state changes to commit"
            exit 0
          fi
          git commit -m "chore(long): publish $(basename "$SRC" .json) [skip ci]"
          for attempt in 1 2 3; do
            echo "push attempt $attempt..."
            if git pull --rebase origin main && git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed; retrying after 5s..."
            sleep 5
          done
          echo "ERROR: failed to push state commit after 3 attempts"
          exit 1

      - name: Upload final mp4 + captions + thumb as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: long-final-${{ needs.prepare.outputs.video_id }}
          path: |
            outputs/final/${{ needs.prepare.outputs.video_id }}.mp4
            outputs/captions/${{ needs.prepare.outputs.video_id }}.srt
            outputs/thumbnails/${{ needs.prepare.outputs.video_id }}.png
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: long-failure-${{ github.run_id }}
          path: |
            logs/
            outputs/final/
            outputs/images/
            outputs/voiceovers/
            outputs/captions/
          if-no-files-found: ignore
          retention-days: 7
