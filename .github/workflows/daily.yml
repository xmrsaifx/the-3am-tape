name: 3AM Tape — 2/day

on:
  # 2 uploads/day, public-immediate (daily_pipeline.py default).
  # Was 4/day until 2026-05-21 (algo was suppressing distribution under
  # high upload volume — first 10 uploads avg 660 views, next 44 avg 22).
  # Bumped to 2/day on 2026-05-21 — the two slots are 14 hours apart so
  # they hit non-overlapping audience windows (US prime vs EU evening +
  # PK late), giving the algo two clean shots/day at different viewers.
  schedule:
    - cron: '0 2 * * *'    # 02:00 UTC -> ~21:00 ET (US prime time, "story before bed")
    - cron: '0 16 * * *'   # 16:00 UTC -> ~21:00 PKT / ~17:00 CET (EU early evening + PK late evening)
  workflow_dispatch:
    inputs:
      topic:
        description: 'Force a topic for the next Claude generation (only used when queue is empty).'
        required: false
        default: ''
      no_upload:
        description: 'Render only, skip YouTube upload.'
        type: boolean
        default: false
      dry_run:
        description: 'Pick the next script and exit (no render, no upload).'
        type: boolean
        default: false

# Concurrency lock: prevent two daily.yml runs from racing each other on
# state commit-back. Without this, simultaneous fires (e.g. cron + manual
# dispatch happening close together) can both pick the same queued script
# and double-upload it. cancel-in-progress=false means later runs queue
# behind the active one and fire when it finishes.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 12-15 horror scenes × ~30 sec each = longer than money-crew Shorts
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg + Liberation font
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # Optional. Without it daily_pipeline.py runs in JSON-only mode
          # and only renders hand-written scripts in scripts/*.json.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional. Without both, Facebook Reels upload is skipped silently.
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          # Optional. Without it, Instagram Reels upload is skipped silently.
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FFMPEG_BIN: ffmpeg
          FFPROBE_BIN: ffprobe
          CAPTION_FONT: /usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf
          OUTPUT_DIR: ./outputs
          LOG_LEVEL: INFO
        run: |
          ARGS=""
          if [ -n "${{ inputs.topic }}" ];           then ARGS="$ARGS --topic \"${{ inputs.topic }}\""; fi
          if [ "${{ inputs.no_upload }}" = "true" ]; then ARGS="$ARGS --no-upload"; fi
          if [ "${{ inputs.dry_run }}" = "true" ];   then ARGS="$ARGS --dry-run"; fi
          echo "running: python daily_pipeline.py $ARGS"
          eval "python daily_pipeline.py $ARGS"

      - name: Snapshot YouTube stats
        if: success() && inputs.dry_run != 'true'
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OUTPUT_DIR: ./outputs
        run: |
          python stats.py | tee outputs/stats/latest.txt || echo "stats step failed (non-fatal)"

      - name: Commit cooldown state + archived script + stats
        if: success()
        run: |
          git config user.name  "the-3am-tape-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/used_topics.json outputs/stats/ scripts/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no state changes to commit"
            exit 0
          fi
          git commit -m "chore(daily): run $(date -u +%Y-%m-%d) [skip ci]"
          # Defensive rebase-then-push loop: even with concurrency lock,
          # external pushes (manual fixes, README edits, etc.) can land
          # between checkout and commit. Try up to 3 times to integrate.
          for attempt in 1 2 3; do
            echo "push attempt $attempt..."
            if git pull --rebase origin main && git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed; retrying after 5s..."
            sleep 5
          done
          echo "ERROR: failed to push state commit after 3 attempts"
          exit 1

      - name: Upload rendered mp4 as artifact (no-upload runs only)
        if: success() && inputs.no_upload == true
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ github.run_id }}
          path: outputs/final/*.mp4
          if-no-files-found: warn
          retention-days: 7

      - name: Upload logs + final mp4 on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-debug-${{ github.run_id }}
          path: |
            logs/
            outputs/final/
            outputs/images/
            outputs/voiceovers/
          if-no-files-found: ignore
          retention-days: 7
